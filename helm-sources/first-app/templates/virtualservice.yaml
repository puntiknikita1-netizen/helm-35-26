apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "first-app.fullname" . }}
spec:
  {{- with .Values.istio.hosts }}
  hosts:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  gateways:
    - {{ include "first-app.fullname" . }}
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ include "first-app.fullname" . }}
            port:
              number: {{ .Values.service.port }}
